<svg xmlns="http://www.w3.org/2000/svg" width="920" height="340" viewBox="0 0 920 340" role="img" aria-labelledby="title desc">
  <title id="title">Cordova iOS icon source assets</title>
  <desc id="desc">Examples of src, foreground, and monochrome source PNG files with real image bounds and transparency preview.</desc>

  <rect width="920" height="340" fill="#f6f7f9"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#1f2937">
    <text x="40" y="36" font-size="20" font-weight="700">Icon source files in config.xml</text>
    <text x="40" y="60" font-size="14">Each source file is a full square image. Transparent regions are shown with checkerboard.</text>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#111827" text-anchor="middle">
    <text x="160" y="92">src="appicon.png"</text>
    <text x="460" y="92">foreground="appicon-dark.png"</text>
    <text x="760" y="92">monochrome="appicon-tint.png"</text>
  </g>

  <!-- src: full-color image (normally opaque) -->
  <g transform="translate(80,108)">
    <rect x="0" y="0" width="160" height="160" fill="url(#gradA)"/>
    <circle cx="80" cy="80" r="56" fill="#ffffff" fill-opacity="0.25"/>
    <path d="M69 66c0-8 6-14 14-14h21c20 0 36 16 36 36s-16 36-36 36H83c-8 0-14-6-14-14V66Zm22 6v32h13c9 0 16-7 16-16s-7-16-16-16H91Z" fill="#ffffff"/>
  </g>

  <!-- foreground: transparent background + foreground artwork only -->
  <g transform="translate(380,108)">
    <rect x="0" y="0" width="160" height="160" fill="url(#checker)"/>
    <path d="M69 66c0-8 6-14 14-14h21c20 0 36 16 36 36s-16 36-36 36H83c-8 0-14-6-14-14V66Zm22 6v32h13c9 0 16-7 16-16s-7-16-16-16H91Z" fill="#111827"/>
  </g>

  <!-- monochrome: transparent background + grayscale mask artwork -->
  <g transform="translate(680,108)">
    <rect x="0" y="0" width="160" height="160" fill="url(#checker)"/>
    <path d="M69 66c0-8 6-14 14-14h21c20 0 36 16 36 36s-16 36-36 36H83c-8 0-14-6-14-14V66Zm22 6v32h13c9 0 16-7 16-16s-7-16-16-16H91Z" fill="#6b7280"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">
    <text x="160" y="290">Base icon image</text>
    <text x="460" y="290">Foreground only, transparent background</text>
    <text x="760" y="290">Single-color mask, transparent background</text>
  </g>

  <defs>
    <linearGradient id="gradA" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
    <pattern id="checker" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#f8fafc"/>
      <rect x="0" y="0" width="8" height="8" fill="#e5e7eb"/>
      <rect x="8" y="8" width="8" height="8" fill="#e5e7eb"/>
    </pattern>
  </defs>
</svg>
